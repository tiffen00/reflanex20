services:
  - type: web
    name: reflanex20
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: campaigns
      - key: GEOIP_PROVIDER
        value: ipapi
      - key: ENABLE_CLICK_ALERTS
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: DOMAINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEB_USERNAME
        sync: false
      - key: WEB_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_TTL_HOURS
        value: "24"
      - key: LOGIN_RATE_LIMIT_PER_15MIN
        value: "5"
      - key: ADMIN_PATH_PREFIX
        value: /web/setlink/connect/service/ww/ww/wwww/www
      - key: OTP_FALLBACK_LOG
        value: "false"
      - key: MAX_ZIP_SIZE_MB
        value: "50"
