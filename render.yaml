services:
  - type: web
    name: reflanex20
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: API_TOKEN
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: DOMAINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/storage/app.db
      - key: STORAGE_DIR
        value: /opt/render/project/src/storage/campaigns
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEB_USERNAME
        sync: false
      - key: WEB_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_TTL_HOURS
        value: "24"
      - key: LOGIN_RATE_LIMIT_PER_15MIN
        value: "5"
      - key: ADMIN_PATH_PREFIX
        value: /web/setlink/connect/service/ww/ww/wwww/www
      - key: OTP_FALLBACK_LOG
        value: "false"
      - key: SEED_DEFAULT_CAMPAIGN
        value: "true"
    disk:
      name: data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
