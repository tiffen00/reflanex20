<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflanex — Code de vérification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <a href="/" class="app-logo">Reflanex</a>
    <nav class="app-nav">
      <a href="mailto:aide@reflanex.fr" class="btn btn-outline btn-pill">Aide</a>
      <a href="/login" class="btn btn-primary btn-pill">Se connecter</a>
    </nav>
  </header>

  <!-- Page content -->
  <main class="page-container">
    <h1 class="page-title">Code de vérification</h1>
    <p class="page-subtitle">Un code à 5 chiffres a été envoyé sur Telegram</p>

    <div class="card">
      <div class="otp-inputs" id="otp-inputs">
        <input type="tel" maxlength="1" class="otp-digit" data-idx="0" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="1" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="2" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="3" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="4" inputmode="numeric" pattern="[0-9]" />
      </div>

      <div class="otp-meta">
        <span id="countdown" class="otp-countdown">5:00</span>
        <span id="attempts-msg" class="error hidden"></span>
      </div>

      <button id="validate-btn" class="btn btn-primary btn-pill btn-full" disabled>
        Valider
      </button>

      <p id="otp-error" class="error-message hidden"></p>

      <a href="/login" id="back-link" class="btn btn-ghost btn-full text-center hidden" style="margin-top:0.75rem;">
        ← Retour au login
      </a>
    </div>
  </main>

  <script src="/static/otp.js"></script>
</body>
</html>
