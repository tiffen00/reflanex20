<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflanex20 — Code OTP</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="login-card">
      <div class="logo">🔐</div>
      <p class="subtitle-title">Code à 5 chiffres</p>
      <p class="subtitle">Un code a été envoyé sur votre Telegram</p>

      <div class="otp-inputs" id="otp-inputs">
        <input type="tel" maxlength="1" class="otp-digit" data-idx="0" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="1" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="2" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="3" inputmode="numeric" pattern="[0-9]" />
        <input type="tel" maxlength="1" class="otp-digit" data-idx="4" inputmode="numeric" pattern="[0-9]" />
      </div>

      <div class="otp-meta">
        <span id="countdown" class="otp-countdown">5:00</span>
        <span id="attempts-msg" class="error hidden"></span>
      </div>

      <button id="validate-btn" class="btn-primary btn-full" disabled>
        Valider
      </button>

      <p id="otp-error" class="error hidden"></p>

      <a href="/login" id="back-link" class="btn-ghost btn-full text-center hidden">
        ← Retour au login
      </a>
    </div>
  </div>
  <script src="/static/otp.js"></script>
</body>
</html>
