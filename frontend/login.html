<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflanex20 — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span class="app-logo">Reflanex20 — Admin</span>
  </header>

  <!-- Page content -->
  <main class="page-container">
    <h1 class="page-title">Connexion</h1>

    <div class="card">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Identifiant</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="Votre identifiant"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="form-input-with-icon">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Afficher le mot de passe">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          Se connecter
        </button>
      </form>

      <p id="login-error" class="error-message hidden"></p>
      <p id="rate-limit-msg" class="error-message hidden"></p>
    </div>
  </main>

  <script>window.ADMIN_PREFIX = "__ADMIN_PREFIX__";</script>
  <script src="/static/login.js"></script>
</body>
</html>
