<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflanex20 — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Main app -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <span class="app-logo">Reflanex20 — Admin</span>
      <nav class="app-nav">
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="btn btn-ghost">Déconnexion</button>
      </nav>
    </header>

    <!-- Tabs navigation -->
    <div class="tabs-bar">
      <div class="tabs-container">
        <button class="nav-tab active" data-tab="upload">Nouvelle campagne</button>
        <button class="nav-tab" data-tab="campaigns">Mes campagnes</button>
      </div>
    </div>

    <!-- Upload tab -->
    <section id="tab-upload" class="tab-content">
      <div class="card">
        <h2>Nouvelle campagne</h2>
        <div class="form-group">
          <label for="campaign-name">Nom de la campagne</label>
          <input type="text" id="campaign-name" placeholder="ex: promo-ete-2025" />
        </div>
        <div
          id="drop-zone"
          class="drop-zone"
          tabindex="0"
          role="button"
          aria-label="Zone de dépôt de fichier zip"
        >
          <div class="drop-icon">📦</div>
          <p>Glisse-dépose ton <strong>.zip</strong> ici</p>
          <p class="drop-hint">ou clique pour choisir</p>
          <input type="file" id="file-input" accept=".zip" hidden />
        </div>
        <div id="file-info" class="file-info hidden"></div>
        <button id="upload-btn" class="btn btn-primary btn-pill" disabled>Uploader</button>
        <div id="upload-result" class="result hidden"></div>
      </div>
    </section>

    <!-- Campaigns tab -->
    <section id="tab-campaigns" class="tab-content hidden">
      <div class="card">
        <div class="section-header">
          <h2>Mes campagnes</h2>
          <button id="refresh-btn" class="btn btn-ghost btn-sm">🔄 Actualiser</button>
        </div>
        <div id="campaigns-list"></div>
      </div>

      <!-- Links panel (shown per campaign) -->
      <div id="links-panel" class="card hidden">
        <div class="section-header">
          <h2 id="links-title">Liens</h2>
          <button id="close-links-btn" class="btn btn-ghost btn-sm">✕ Fermer</button>
        </div>
        <div id="new-link-form" class="form-inline">
          <select id="domain-select">
            <option value="">URL par défaut</option>
          </select>
          <button id="generate-link-btn" class="btn btn-primary btn-pill">+ Nouveau lien</button>
        </div>
        <div id="links-list"></div>
      </div>
    </section>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
